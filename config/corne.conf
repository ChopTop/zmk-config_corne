# ===== Общие настройки =====
CONFIG_ZMK_SLEEP=y
# Увеличиваем мощность передатчика для стабильной связи
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ===== Настройки OLED дисплея =====
# Включаем поддержку дисплея и кастомный статус-скрин
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Подключаем модуль nice!oled для красивых виджетов [citation:1]
# Эти параметры активируются благодаря модулю, добавленному в west.yml
CONFIG_NICE_OLED_WIDGET_LAYER_STATUS=y
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS=y
CONFIG_NICE_OLED_WIDGET_WPM=y
CONFIG_NICE_OLED_WIDGET_PROFILE=y
CONFIG_NICE_OLED_WIDGET_BATTERY_STATUS=y
CONFIG_NICE_OLED_WIDGET_CONNECTION_STATUS=y

# ===== Настройки RGB (Underglow + Backlight) =====
# Включаем поддержку RGB-ленты (WS2812)
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW=y

# !!! ВНИМАНИЕ: Количество светодиодов [citation:2] !!!
# Для Corne v3, обычно: 6 (backlight) + 12 (underglow) = 18 на половинку.
# Если у вас другая схема подключения, замените 18 на свое значение.
# Например, если вы хотите управлять ими отдельно, раскомментируйте строки ниже.
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
# Задаем количество светодиодов на одной половинке
CONFIG_ZMK_RGB_UNDERGLOW_NUM_LEDS=18

# Настройки цвета и эффектов по умолчанию (можно менять комбинациями клавиш)
CONFIG_ZMK_RGB_UNDERGLOW_HUE=300   # Розовый/фиолетовый
CONFIG_ZMK_RGB_UNDERGLOW_SAT=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT=50

# Включаем периферию по умолчанию (для RGB и OLED нужно подать питание)
CONFIG_ZMK_EXT_POWER=y

# ===== Настройки батареи =====
CONFIG_ZMK_BATTERY_REPORTING=y